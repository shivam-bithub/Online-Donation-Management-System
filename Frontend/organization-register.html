<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register Organization — online donation</title>
  <link rel="stylesheet" href="css/style-new.css" />
</head>
<body style="background:#f7fafc;">

<header class="vc-header" style="position:sticky;top:0;z-index:1000;background:rgba(255,255,255,.9);backdrop-filter:saturate(180%) blur(6px);box-shadow:0 2px 18px rgba(0,0,0,.06);">
  <div class="vc-container header-inner" style="display:flex;align-items:center;justify-content:space-between;gap:16px;padding:10px 0;">
    <a class="vc-brand" href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
      <span aria-hidden="true" style="display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:10px;background:#e8f2ff;color:#2a62ff;font-weight:700;">OD</span>
      <span class="vc-logo-text" style="font-weight:700;color:#111;">online donation</span>
    </a>
  </div>
  </header>

<main class="vc-container" style="padding:24px 0 48px 0;">
  <section style="display:grid;grid-template-columns:1fr;gap:16px;align-items:start;max-width:760px;margin:0 auto;">
    <article class="vc-card" style="padding:18px;border-radius:16px;background:#fff;box-shadow:0 12px 28px rgba(0,0,0,.06);">
      <h2 style="margin:0 0 8px 0;">Register an Organization</h2>
      <p style="margin:0 0 14px 0;color:#556;">Staff only. Provide verified details to onboard an NGO.</p>
      <form id="orgForm" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;">
        <div style="grid-column:1 / -1;"><label style="display:block;margin-bottom:6px;color:#223;">Organization Name</label><input type="text" id="name" required style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:10px;"></div>
        <div><label style="display:block;margin-bottom:6px;color:#223;">Registration Number</label><input type="text" id="regNo" required style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:10px;"></div>
        <div><label style="display:block;margin-bottom:6px;color:#223;">Email</label><input type="email" id="email" required style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:10px;"></div>
        <div><label style="display:block;margin-bottom:6px;color:#223;">Phone</label><input type="text" id="phone" style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:10px;"></div>
        <div style="grid-column:1 / -1;"><label style="display:block;margin-bottom:6px;color:#223;">Head Office Address</label><textarea id="address" rows="3" style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:10px;"></textarea></div>
        <div style="grid-column:1 / -1;display:flex;gap:8px;align-items:center;justify-content:flex-start;margin-top:8px;">
          <button type="submit" class="btn btn-primary" style="border-radius:999px;">Register Organization</button>
          <a href="staff-dashboard.html" class="btn btn-ghost" style="border-radius:999px;">Back to Staff</a>
        </div>
      </form>
      <p id="orgStatus" class="alert" style="margin-top:10px;"></p>
    </article>
  </section>
</main>

<script src="js/organization.js"></script>
</body>
</html>
