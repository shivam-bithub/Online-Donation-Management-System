<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login — online donation</title>
<link rel="stylesheet" href="css/style-new.css" />
</head>
<body style="background:#f7fafc;">

<header class="vc-header" style="position:sticky;top:0;z-index:1000;background:rgba(255,255,255,.9);backdrop-filter:saturate(180%) blur(6px);box-shadow:0 2px 18px rgba(0,0,0,.06);">
  <div class="vc-container header-inner" style="display:flex;align-items:center;justify-content:space-between;gap:16px;padding:10px 0;">
    <a class="vc-brand" href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
      <span aria-hidden="true" style="display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:10px;background:#e8f2ff;color:#2a62ff;font-weight:700;">OD</span>
      <span class="vc-logo-text" style="font-weight:700;color:#111;">online donation</span>
    </a>
    <nav class="vc-nav" style="display:flex;align-items:center;gap:12px;">
      <ul style="display:flex;align-items:center;gap:16px;list-style:none;margin:0;padding:0;">
        <li><a href="index.html" style="padding:8px 10px;color:#111;">Home</a></li>
        <li><a href="donation.html" class="btn btn-primary" style="padding:8px 14px;border-radius:999px;">Donate</a></li>
        <li><a href="register.html" style="padding:8px 10px;color:#111;">Register</a></li>
      </ul>
    </nav>
  </div>
</header>

<main style="min-height:calc(100dvh - 64px);display:flex;align-items:center;justify-content:center;padding:24px;">
  <div style="width:100%;max-width:440px;background:#fff;border-radius:16px;box-shadow:0 10px 36px rgba(0,0,0,.10);padding:22px 22px;">
    <h1 style="margin:6px 0 8px 0;font-size:22px;">Welcome back</h1>
    <p style="margin:0 0 16px 0;color:#556;line-height:1.5;">Sign in to continue. Donors and NGOs can access their dashboards after login.</p>

    <form id="loginForm">
      <label for="email" style="display:block;margin:10px 0 6px 0;color:#223;">Email</label>
      <input type="email" id="email" required style="width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:10px;outline:none;" />

      <label for="userType" style="display:block;margin:12px 0 6px 0;color:#223;">User Type</label>
      <select id="userType" required style="width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:10px;outline:none;">
        <option value="">Select...</option>
        <option value="Donor">Donor</option>
        <option value="Receiver">Receiver</option>
        <option value="NGO">NGO</option>
        <option value="Staff">Staff</option>
      </select>

      <label for="password" style="display:block;margin:12px 0 6px 0;color:#223;">Password</label>
      <div style="position:relative;">
        <input type="password" id="password" required style="width:100%;padding:10px 40px 10px 12px;border:1px solid #e5e7eb;border-radius:10px;outline:none;" />
        <button type="button" id="togglePwd" aria-label="Show password" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:transparent;cursor:pointer;color:#667;">👁</button>
      </div>

      <button type="submit" style="margin-top:14px;width:100%;padding:12px 14px;border:none;border-radius:999px;background:#2a62ff;color:#fff;font-weight:600;cursor:pointer;">Login</button>
      <p id="loginError" class="alert" style="margin:10px 0 0 0;color:#c00;"></p>

      <p style="margin:16px 0 0 0;color:#556;">Don’t have an account? <a href="register.html">Register</a></p>
    </form>
  </div>
</main>

<script>
  const toggle = document.getElementById('togglePwd');
  const pwd = document.getElementById('password');
  if (toggle && pwd) {
    toggle.addEventListener('click', () => {
      const show = pwd.getAttribute('type') === 'password' ? 'text' : 'password';
      pwd.setAttribute('type', show);
      toggle.textContent = show === 'password' ? '👁' : '🙈';
      toggle.setAttribute('aria-label', show === 'password' ? 'Show password' : 'Hide password');
    });
  }
</script>
<script src="js/login.js?v=3.0"></script>
</body>
</html>
