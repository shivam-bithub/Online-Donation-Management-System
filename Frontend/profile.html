<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Profile — online donation</title>
  <link rel="stylesheet" href="css/style-new.css" />
  <style>
    .profile-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 20px;
      border-radius: 16px;
      margin-bottom: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,.1);
    }
    
    .profile-photo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    
    .profile-photo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid white;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
    }
    
    .profile-initials {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 700;
      color: white;
      border: 4px solid white;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
    }
    
    .profile-info {
      text-align: center;
    }
    
    .profile-info h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
    }
    
    .profile-info p {
      margin: 4px 0;
      opacity: 0.95;
    }
    
    .profile-badge {
      display: inline-block;
      background: rgba(255,255,255,.2);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 8px;
    }
    
    .profile-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      justify-content: center;
    }
    
    .btn-change-photo {
      background: rgba(255,255,255,.9);
      color: #667eea;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn-change-photo:hover {
      background: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
    }
    
    .profile-details {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 18px rgba(0,0,0,.08);
    }
    
    .detail-group {
      margin-bottom: 24px;
    }
    
    .detail-group:last-child {
      margin-bottom: 0;
    }
    
    .detail-label {
      display: block;
      color: #667;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    
    .detail-value {
      display: block;
      color: #223;
      font-size: 16px;
      font-weight: 500;
      word-break: break-all;
    }
    
    .detail-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      margin-bottom: 24px;
    }
    
    .detail-row .detail-group {
      margin-bottom: 0;
    }
    
    .loading {
      text-align: center;
      padding: 40px 20px;
      color: #667;
    }
    
    .error {
      background: #fee;
      color: #c00;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 24px;
    }
    
    #photoUpload {
      display: none;
    }
  </style>
</head>
<body style="background:#f7fafc;">

  <!-- NAVBAR -->
  <header class="vc-header" style="position:sticky;top:0;z-index:1000;background:rgba(255,255,255,.9);backdrop-filter:saturate(180%) blur(6px);box-shadow:0 2px 18px rgba(0,0,0,.06);">
    <div class="vc-container header-inner" style="display:flex;align-items:center;justify-content:space-between;gap:16px;padding:10px 0;">
      <a class="vc-brand" href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
        <span aria-hidden="true" style="display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:10px;background:#e8f2ff;color:#2a62ff;font-weight:700;">OD</span>
        <span class="vc-logo-text" style="font-weight:700;color:#111;">online donation</span>
      </a>
      <nav class="vc-nav" id="vc-nav" style="display:flex;align-items:center;gap:12px;">
        <ul id="nav-links" style="display:flex;align-items:center;gap:16px;list-style:none;margin:0;padding:0;">
          <li><a href="index.html" style="padding:8px 10px;color:#111;">Home</a></li>
          <li><a href="donation.html" class="btn btn-primary" style="padding:8px 14px;border-radius:999px;">Donate</a></li>
          <li><a href="feedback.html" style="padding:8px 10px;color:#111;">Feedback</a></li>
          <li id="auth-link"><a href="login.html" style="padding:8px 10px;color:#111;">Login</a></li>
        </ul>
        <button id="nav-toggle" class="vc-hamburger" aria-label="Open navigation" style="border:none;background:#eef2f7;padding:8px 10px;border-radius:10px;cursor:pointer;display:none;">☰</button>
      </nav>
    </div>
  </header>

  <main class="vc-container" style="min-height:calc(100dvh - 64px);padding:40px 20px;">
    <div style="max-width:800px;margin:0 auto;">
      
      <!-- Profile Header -->
      <div class="profile-header" id="profileHeader">
        <div class="loading">Loading profile...</div>
      </div>
      
      <!-- Profile Details -->
      <div class="profile-details" id="profileDetails">
        <div class="loading">Loading details...</div>
      </div>
      
    </div>
  </main>

  <!-- Hidden file input for photo upload -->
  <input type="file" id="photoUpload" accept="image/*" />

  <script>
    const API = 'http://localhost:3000/api';
    let TOKEN = localStorage.getItem('token') || '';

    // Check if user is logged in
    if (!TOKEN) {
      window.location.href = 'login.html';
    }

    async function fetchWithAuth(path, options = {}) {
      if (!TOKEN) throw new Error('Missing token');
      options.headers = options.headers || {};
      options.headers['Authorization'] = `Bearer ${TOKEN}`;
      if (!options.headers['Content-Type'] && options.body && !(options.body instanceof FormData)) {
        options.headers['Content-Type'] = 'application/json';
      }
      const res = await fetch(`${API}${path}`, options);
      const text = await res.text();
      if (!text) return res.ok ? {} : Promise.reject(new Error('Empty response'));
      const data = JSON.parse(text);
      if (!res.ok) throw new Error(data.message || data.error || res.statusText);
      return data;
    }

    async function loadProfile() {
      try {
        const user = await fetchWithAuth('/auth/me');
        
        // Display profile header
        const headerHtml = `
          <div class="profile-photo-section">
            ${user.avatarUrl ? 
              `<img src="${user.avatarUrl}" alt="Profile" class="profile-photo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
               <div class="profile-initials" style="display:none;">${user.username?.charAt(0).toUpperCase()}</div>` :
              `<div class="profile-initials">${user.username?.charAt(0).toUpperCase()}</div>`
            }
            <div class="profile-info">
              <h1>${user.username}</h1>
              <p>${user.email}</p>
              <span class="profile-badge">${user.userType}</span>
              <div class="profile-actions">
                <button class="btn-change-photo" id="changePhotoBtn">📸 Change Photo</button>
              </div>
            </div>
          </div>
        `;
        document.getElementById('profileHeader').innerHTML = headerHtml;
        
        // Display profile details
        const detailsHtml = `
          <h2 style="margin:0 0 24px 0;font-size:20px;">Personal Information</h2>
          
          <div class="detail-row">
            <div class="detail-group">
              <span class="detail-label">Email</span>
              <span class="detail-value">${user.email}</span>
            </div>
            <div class="detail-group">
              <span class="detail-label">User Type</span>
              <span class="detail-value">${user.userType}</span>
            </div>
          </div>
          
          ${user.phone ? `
          <div class="detail-row">
            <div class="detail-group">
              <span class="detail-label">Phone</span>
              <span class="detail-value">${user.phone}</span>
            </div>
            ${user.age ? `
            <div class="detail-group">
              <span class="detail-label">Age</span>
              <span class="detail-value">${user.age}</span>
            </div>
            ` : ''}
          </div>
          ` : ''}
          
          ${user.address ? `
          <div class="detail-group">
            <span class="detail-label">Address</span>
            <span class="detail-value">${user.address}</span>
          </div>
          ` : ''}
          
          ${user.bio ? `
          <div class="detail-group">
            <span class="detail-label">Bio</span>
            <span class="detail-value">${user.bio}</span>
          </div>
          ` : ''}
          
          <hr style="margin:24px 0;border:none;border-top:1px solid #e5e7eb;">
          
          <h2 style="margin:24px 0 16px 0;font-size:16px;">Account Information</h2>
          <div class="detail-row">
            <div class="detail-group">
              <span class="detail-label">Account ID</span>
              <span class="detail-value" style="font-family:monospace;font-size:12px;">${user._id}</span>
            </div>
            <div class="detail-group">
              <span class="detail-label">Verification Status</span>
              <span class="detail-value">${user.isVerified ? '✅ Verified' : '⏳ Pending'}</span>
            </div>
          </div>
        `;
        document.getElementById('profileDetails').innerHTML = detailsHtml;
        
        // Add change photo handler
        document.getElementById('changePhotoBtn').addEventListener('click', () => {
          document.getElementById('photoUpload').click();
        });
        
        document.getElementById('photoUpload').addEventListener('change', async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          
          if (file.size > 5 * 1024 * 1024) {
            alert('Photo size must be less than 5MB');
            return;
          }
          
          const formData = new FormData();
          formData.append('profilePhoto', file);
          
          try {
            const changePhotoBtn = document.getElementById('changePhotoBtn');
            changePhotoBtn.disabled = true;
            changePhotoBtn.textContent = '⏳ Uploading...';
            
            const response = await fetchWithAuth('/auth/profile/photo', {
              method: 'POST',
              body: formData
            });
            
            changePhotoBtn.textContent = '✅ Uploaded!';
            setTimeout(() => {
              changePhotoBtn.disabled = false;
              changePhotoBtn.textContent = '📸 Change Photo';
              // Reload profile to show new photo
              loadProfile();
            }, 2000);
            
          } catch (err) {
            alert('Error uploading photo: ' + err.message);
            document.getElementById('changePhotoBtn').disabled = false;
            document.getElementById('changePhotoBtn').textContent = '📸 Change Photo';
          }
        });
        
      } catch (err) {
        console.error('Error loading profile:', err);
        document.getElementById('profileHeader').innerHTML = `<div class="error">❌ Error loading profile: ${err.message}</div>`;
        document.getElementById('profileDetails').innerHTML = `<div class="error">❌ ${err.message}</div>`;
      }
    }

    // Load profile on page load
    document.addEventListener('DOMContentLoaded', loadProfile);
  </script>
  <script src="js/index.js"></script>
</body>
</html>
