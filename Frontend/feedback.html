<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feedback — Online Donation</title>
  <link rel="stylesheet" href="css/style-new.css" />
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f7fafc;
      color: #111;
    }

    .vc-card {
      background: #fff;
      align-items: center;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      transition: all 0.3s ease;
    }

    .vc-card:hover {
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
      transform: translateY(-2px);
    }

    form label {
      display: block;
      margin-top: 14px;
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }

    form input, form select, form textarea {
      width: 100%;
      margin-top: 6px;
      padding: 10px 12px;
      border: 1px solid #ccd6e0;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.2s ease;
      outline: none;
      background: #f9fbfd;
    }

    form input:focus, form select:focus, form textarea:focus {
      border-color: #2a62ff;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(42, 98, 255, 0.15);
    }

    .btn.btn-primary {
      background: linear-gradient(90deg, #2a62ff, #5b8cff);
      color: #fff;
      border: none;
      padding: 10px 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: 999px;
    }

    .btn.btn-primary:hover {
      transform: scale(1.03);
      background: linear-gradient(90deg, #244ed9, #467eff);
    }

    #feedbackStatus {
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    @media (max-width: 850px) {
      section {
        grid-template-columns: 1fr !important;
      }
    }
  </style>
</head>
<body>

<header class="vc-header" style="position:sticky;top:0;z-index:1000;background:rgba(255,255,255,.9);backdrop-filter:saturate(180%) blur(6px);box-shadow:0 2px 18px rgba(0,0,0,.06);">
  <div class="vc-container header-inner" style="display:flex;align-items:center;justify-content:space-between;gap:16px;padding:10px 0;">
    <a class="vc-brand" href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
      <span aria-hidden="true" style="display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:10px;background:#e8f2ff;color:#2a62ff;font-weight:700;">OD</span>
      <span class="vc-logo-text" style="font-weight:700;color:#111;">Online Donation</span>
    </a>
    <nav class="vc-nav" style="display:flex;align-items:center;gap:12px;">
      <ul style="display:flex;align-items:center;gap:16px;list-style:none;margin:0;padding:0;">
        <li><a href="index.html" style="padding:8px 10px;color:#111;">Home</a></li>
        <li><a href="donation.html" class="btn btn-primary">Donate</a></li>
        <li><a href="login.html" style="padding:8px 10px;color:#111;">Login</a></li>
      </ul>
    </nav>
  </div>
</header>

<main class="vc-container" style="padding:32px 0 64px 0;">
  <section style="display:grid;grid-template-columns:1.2fr 1fr;gap:24px;align-items:start;">
    
    <!-- Feedback Form -->
    <article class="vc-card">
      <h2 style="margin:0 0 8px 0;font-size:22px;">💬 Give Your Feedback</h2>
      <p style="margin:0 0 14px 0;color:#556;">Your opinion helps us improve our donation experience.</p>

      <form id="feedbackForm">
        <!-- <label for="userId">User ID (auto-filled)</label>
        <input type="text" id="userId" disabled /> -->

        <label for="userType">User Type</label>
        <select id="userType">
          <option value="Donor">Donor</option>
          <option value="Receiver">Receiver</option>
          <option value="NGO">NGO</option>
        </select>

        <label for="comment">Your Feedback</label>
        <textarea id="comment" rows="4" required placeholder="Share your thoughts or suggestions..."></textarea>

        <button type="submit" class="btn btn-primary" style="margin-top:18px;">Submit Feedback</button>
        <p id="feedbackStatus"></p>
      </form>
    </article>

    <!-- Testimonials -->
    <!-- <aside class="vc-card">
      <h3 style="margin:0 0 8px 0;">Recent Testimonials</h3>
      <div id="recentTestimonials" style="display:grid;gap:10px;">
        <p style="margin:0;color:#778;">Loading...</p>
      </div>
    </aside> -->

  </section>
</main>

<script src="js/feedback.js"></script>

</body>
</html>
